<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Nota</title>
</head>
<body>
    <h1>Cadastrar nota</h1>

    <p>Aluno: <span th:text="${aluno.nome}"></span></p>

    <form th:action="@{/alunos/{id}/notas(id=${aluno.id})}" method="post">
        <label>Descrição:</label>
        <input type="text" name="descricao">
        <br><br>

        <label>Valor:</label>
        <input type="number" step="0.1" name="valor" required>
        <br><br>

        <button type="submit">Cadastrar</button>
    </form>

    <br>
    <a th:href="@{/alunos/{id}(id=${aluno.id})}">Voltar</a>
</body>
</html>
